<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Guarida de Hécate | Reservas</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/x-icon" href="../assets/img/favicon.png">
</head>

<body>
    <header class="nav-altar">
        <nav class="container">
            <ul class="nav-links">
                <li><a href="services.html">El Herbolario</a></li>
                <li><a href="../index.html#oraculos">Oráculos</a></li>
                <li class="logo-central">
                    <a href="../index.html">
                        <h1>La Guarida de Hécate</h1>
                    </a>
                </li>
                <li><a href="reservations.html">Reservar</a></li>
                <li><a href="contact.html">Mensajería</a></li>
                <li id="profile-link"><a href="login.html">Mi refugio</a></li>

            </ul>
        </nav>
    </header>
    <main class="container">
        <section class="reservation-box">
            <h2 class="section-title">Sellar una Cita</h2>
            <form class="ritual-form">
                <div class="form-group">
                    <label>Ritual deseado</label>
                    <select name="servicio" required>
                        <option value="mesa">Solo Mesa (Cafetería)</option>
                        <option value="tarot">Lectura de Tarot</option>
                        <option value="posos">Lectura de Posos de Té</option>
                    </select>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" name="fecha" required>
                    </div>
                    <div class="form-group">
                        <label>Hora</label>
                        <input type="time" name="hora" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>¿Te acompaña un familiar animal? (Opcional)</label>
                    <input type="text" name="mascota" placeholder="Ej: Un gato negro, un perro pequeño...">
                </div>

                <div class="form-group">
                    <label>Intolerancias o Alergias</label>
                    <textarea name="intolerancias"
                        placeholder="Cuéntanos si debemos cuidar algún ingrediente..."></textarea>
                </div>

                <div class="form-group">
                    <label>Tus intenciones o peticiones especiales</label>
                    <textarea name="peticiones"
                        placeholder="¿Alguna petición para el universo o para nosotros?"></textarea>
                </div>

                <button type="submit" class="btn-floral">Sellar Reserva</button>
            </form>
        </section>
        <a href="#" class="back-to-top" id="backToTop" title="Volver al inicio">
            <span class="symbol">↑</span>
        </a>

    </main>
    <footer class="forest-footer">
        <div class="container">
            <p>&copy; 2026 La Guarida de Hécate • Hecho con raíces y estrellas</p>
            <div class="social-icons">𓇗 ☾ 𓋹</div>
        </div>
    </footer>
    <script src="../js/reservation.js"></script>
</body>

</html>
