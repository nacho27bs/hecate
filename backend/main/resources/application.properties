spring.application.name=hecate-backend
server.port=8081

# H2 en memoria (no necesita instalar nada)
spring.datasource.url=jdbc:h2:mem:hecatedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Consola H2 (útil para ver los datos en el navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console