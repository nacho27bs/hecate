<!-- src/app/pages/reservations/reservations.component.html -->
<main class="container">
  <section class="reservation-box">
    <h2 class="section-title">Sellar una Cita</h2>

    @if (errorMessage()) {
      <p class="error-msg">{{ errorMessage() }}</p>
    }
    @if (successMessage()) {
      <p class="success-msg">{{ successMessage() }}</p>
    }

    <form class="ritual-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Ritual deseado</label>
        <select formControlName="servicio">
          <option value="mesa">Solo Mesa (Cafetería)</option>
          <option value="tarot">Lectura de Tarot</option>
          <option value="posos">Lectura de Posos de Té</option>
        </select>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Fecha</label>
          <input type="date" formControlName="fecha" [min]="minDate">
          @if (submitted && f['fecha'].errors?.['required']) {
            <span class="field-error">La fecha es obligatoria</span>
          }
        </div>
        <div class="form-group">
          <label>Hora</label>
          <input type="time" formControlName="hora">
          @if (submitted && f['hora'].errors?.['required']) {
            <span class="field-error">La hora es obligatoria</span>
          }
        </div>
      </div>

      <button type="submit" class="btn-floral">Sellar Reserva</button>
    </form>
  </section>
</main>
